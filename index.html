<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ресторан Mini App</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #fcfcfc;
      color: #212121;
      min-height: 100vh;
      box-sizing: border-box;
    }

    header {
      background: linear-gradient(90deg, #FF8A00 0%, #E52E71 100%);
      color: #fff;
      text-align: center;
      padding: 32px 12px 18px 12px;
      border-radius: 0 0 30px 30px;
      position: relative;
      box-shadow: 0 6px 24px 0 rgba(151,71,255,0.09);
    }
    .banner-img {
      width: 100%;
      max-height: 140px;
      object-fit: cover;
      border-radius: 0 0 18px 18px;
      margin-bottom: 12px;
    }
    .logo {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: 50%;
      background: #fff;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 90px;
      border: 3px solid #fff;
      box-shadow: 0 2px 12px 0 rgba(0,0,0,0.09);
    }
    .greeting {
      margin-top: 54px;
      font-size: 1.3em;
      font-weight: bold;
      letter-spacing: 0.01em;
      line-height: 1.35;
    }

    main {
      padding: 16px 10px 70px 10px;
      max-width: 500px;
      margin: 0 auto;
    }
    .categories {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 14px 0 18px 0;
      flex-wrap: wrap;
    }
    .cat-btn {
      background: #fff;
      border: none;
      border-radius: 21px;
      padding: 7px 20px;
      font-size: 1em;
      font-weight: 600;
      color: #E52E71;
      box-shadow: 0 2px 8px 0 rgba(255,138,0,0.08);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .cat-btn.active, .cat-btn:hover {
      background: #E52E71;
      color: #fff;
    }
    .menu-list {
      margin: 0;
      padding: 0;
      display: grid;
      gap: 15px;
    }
    .menu-item {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 2px 14px 0 rgba(229,46,113,0.07);
      padding: 14px 13px 13px 13px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .menu-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .dish-name {
      font-weight: bold;
      font-size: 1.08em;
    }
    .dish-price {
      background: #FF8A00;
      color: #fff;
      border-radius: 11px;
      padding: 2px 11px;
      font-size: 1em;
      font-weight: 600;
      margin-left: 7px;
    }
    .dish-desc {
      font-size: 0.96em;
      color: #6a6a6a;
      margin-bottom: 7px;
    }
    .add-btn {
      align-self: flex-end;
      background: linear-gradient(90deg,#E52E71 30%,#FF8A00 100%);
      color: #fff;
      border: none;
      border-radius: 19px;
      padding: 7px 17px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 1px 6px 0 rgba(229,46,113,0.14);
      transition: background 0.13s;
      margin-top: 6px;
    }
    .add-btn:active { transform: scale(0.97); }

    /* Cart styles */
    .cart-wrap {
      position: fixed;
      left: 0;right: 0;bottom: 0;
      background: #fff;
      box-shadow: 0 -2px 18px 0 rgba(54,11,33,0.09);
      padding: 13px 8px 8px 8px;
      border-radius: 18px 18px 0 0;
      max-width: 500px;
      margin: 0 auto;
      z-index: 5;
      transition: transform .27s;
    }
    .cart-collapsed {
      transform: translateY(88%);
    }
    .cart-title {
      font-size: 1.10em;
      font-weight: 600;
      color: #E52E71;
      margin-bottom: 14px;
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cart-list {
      list-style: none;
      margin: 0 0 7px 0;
      padding: 0;
      max-height: 180px;
      overflow-y: auto;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px dashed #f2c6e0;
      font-size: 1em;
      color: #292929;
      gap: 5px;
    }
    .cart-item span {
      font-size: 1em;
    }
    .cart-qty-btns {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .cart-btn {
      background: #faf1f5;
      color: #E52E71;
      border: none;
      border-radius: 50%;
      width: 27px;height: 27px;
      font-size: 1.02em;
      cursor: pointer;
      font-weight: bold;
      transition: background .12s;
    }
    .cart-btn:active { background: #fbd3ed; }
    .cart-total {
      font-size: 1.15em;
      font-weight: bold;
      text-align: right;
      color: #FF8A00;
      margin-bottom: 8px;
      margin-top: 4px;
    }
    .cart-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .order-btn {
      background: linear-gradient(90deg,#FF8A00 30%,#E52E71 100%);
      color: #fff;
      border: none;
      border-radius: 19px;
      padding: 9px 30px;
      font-size: 1.08em;
      font-weight: 600;
      box-shadow: 0 1px 6px 0 rgba(229,46,113,0.11);
      cursor: pointer;
      transition: background .13s;
    }
    .order-btn:active { transform: scale(.97); }
    .cart-minify-btn {
      margin-right: auto;
      background: none;
      border:none;
      color: #222;
      font-size: 1em;
      opacity: 0.5;
      cursor: pointer;
    }
    .cart-empty {
      padding: 21px 0 11px 0;
      color: #9c7595;
      text-align: center;
      font-size: 1.04em;
    }
    /* Responsive */
    @media (max-width: 600px) {
      header, .cart-wrap, main { border-radius: 0 }
      .cart-wrap { left: 0; right: 0; }
      .logo { width: 55px;height: 55px;top: 76px;}
      .greeting { margin-top: 43px;}
      main {padding: 14px 3px 63px 3px;}
    }
  </style>
</head>
<body>
  <header>
    <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=800&q=80" alt="Banner" class="banner-img" loading="lazy">
    <img src="https://cdn-icons-png.flaticon.com/512/2921/2921822.png" alt="Logo" class="logo">
    <div class="greeting">
      Добро пожаловать в ресторан "Mini App"!<br>
      Попробуйте лучшие блюда прямо сейчас 🍲
    </div>
  </header>

  <main>
    <div class="categories">
      <button class="cat-btn active" data-cat="soups">Супы</button>
      <button class="cat-btn" data-cat="salads">Салаты</button>
      <button class="cat-btn" data-cat="drinks">Напитки</button>
    </div>
    <section id="menu">
      <!-- Меню будет сгенерировано с JS -->
    </section>
  </main>

  <div class="cart-wrap cart-collapsed" id="cartWrap">
    <div class="cart-title">
      <button class="cart-minify-btn" id="cartMinifyBtn" title="Скрыть">
        <span style="font-size:1.19em;">&#11167;</span>
      </button>
      Корзина
    </div>
    <ul class="cart-list" id="cartList"></ul>
    <div class="cart-empty" id="cartEmpty" style="display:none;">Ваша корзина пока пуста</div>
    <div class="cart-total" id="cartTotal"></div>
    <div class="cart-actions">
      <button class="order-btn" id="orderBtn">Отправить заказ</button>
    </div>
  </div>

  <script>
  // --- Меню ресторана --- //
  const MENU = {
    soups: [
      {
        id: 's1', name: 'Борщ', desc: 'Традиционный украинский суп из свёклы, капусты и мяса.', price: 230
      },
      {
        id: 's2', name: 'Куриный суп с лапшой', desc: 'Лёгкий суп на курином бульоне с домашней лапшой.', price: 190
      },
      {
        id: 's3', name: 'Сырный крем-суп', desc: 'Ультрамягкий сырный суп с гренками.', price: 220
      }
    ],
    salads: [
      {
        id: 'sal1', name: 'Цезарь с курицей', desc: 'Куриная грудка, лист салата, пармезан, сухарики, соус.', price: 310
      },
      {
        id: 'sal2', name: 'Греческий салат', desc: 'Сыр фета, свежие овощи, маслины, оливковое масло.', price: 270
      },
      {
        id: 'sal3', name: 'Овощной с киноа', desc: 'Овощи, зелень и киноа с лаймовым соусом.', price: 250
      }
    ],
    drinks: [
      {
        id: 'd1', name: 'Компот', desc: 'Домашний ягодный компот, охлаждённый.', price: 90
      },
      {
        id: 'd2', name: 'Чай с облепихой', desc: 'Насыщенный чай с облепихой и мёдом.', price: 120
      },
      {
        id: 'd3', name: 'Лимонад', desc: 'Свежий лимонад собственного приготовления.', price: 110
      }
    ]
  };

  // --- Корзина --- //
  let cart = {}; // key: id, value: {qty, data}

  function renderMenu(category='soups') {
    const menuEl = document.getElementById('menu');
    menuEl.innerHTML = '';
    const items = MENU[category];
    const ul = document.createElement('div');
    ul.className = 'menu-list';
    for (let item of items) {
      let li = document.createElement('div');
      li.className = 'menu-item';
      li.innerHTML = `
        <div class="menu-item-header">
          <span class="dish-name">${item.name}</span>
          <span class="dish-price">${item.price} ₽</span>
        </div>
        <div class="dish-desc">${item.desc}</div>
        <button class="add-btn" data-id="${item.id}">Добавить в корзину</button>
      `;
      ul.appendChild(li);
    }
    menuEl.appendChild(ul);
  }

  function setActiveCategory(cat) {
    document.querySelectorAll('.cat-btn').forEach(btn => {
      if (btn.dataset.cat === cat) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  }

  function showCart(open=true) {
    let wrap = document.getElementById('cartWrap');
    if (open) wrap.classList.remove('cart-collapsed');
    else wrap.classList.add('cart-collapsed');
  }

  function updateCart() {
    const cartList = document.getElementById('cartList');
    const cartEmpty = document.getElementById('cartEmpty');
    cartList.innerHTML = '';
    let items = Object.values(cart);
    if (items.length === 0) {
      cartEmpty.style.display = '';
      cartList.style.display = 'none';
      document.getElementById('cartTotal').textContent = '';
      showCart(false);
      return;
    }
    cartEmpty.style.display = 'none';
    cartList.style.display = '';

    let total = 0;
    for (let {qty, data} of items) {
      let li = document.createElement('li');
      li.className = 'cart-item';
      li.innerHTML = `
        <span>${data.name}</span>
        <div class="cart-qty-btns">
          <button class="cart-btn" data-action="minus" data-id="${data.id}">-</button>
          <span>${qty}</span>
          <button class="cart-btn" data-action="plus" data-id="${data.id}">+</button>
          <span style="width:32px;text-align:right;">${data.price * qty}₽</span>
          <button class="cart-btn" data-action="remove" data-id="${data.id}" style="width:25px;color:#ccc;">&#10006;</button>      
        </div>
      `;
      cartList.appendChild(li);
      total += data.price * qty;
    }
    document.getElementById('cartTotal').textContent = 'Сумма: ' + total + ' ₽';
    showCart();
  }

  function addToCart(id, data) {
    if (!cart[id]) cart[id] = {qty:1, data};
    else cart[id].qty++;
    updateCart();
  }
  function cartAction(id, action) {
    if (!cart[id]) return;
    if (action === 'plus') cart[id].qty++;
    else if (action === 'minus') { cart[id].qty--; if (cart[id].qty<1) delete cart[id]; }
    else if (action === 'remove') delete cart[id];
    updateCart();
  }

  // Слушатели событий
  document.querySelector('.categories').addEventListener('click', function(e){
    const btn = e.target.closest('.cat-btn');
    if (!btn) return;
    const cat = btn.dataset.cat;
    setActiveCategory(cat);
    renderMenu(cat);
  });

  document.getElementById('menu').addEventListener('click', function(e){
    const btn = e.target.closest('.add-btn');
    if (!btn) return;
    let id = btn.dataset.id;
    // В каком разделе ищем?
    let cat = document.querySelector('.cat-btn.active').dataset.cat;
    let dish = MENU[cat].find(x=>x.id===id);
    addToCart(id, dish);
  });

  document.getElementById('cartList').addEventListener('click', function(e){
    const btn = e.target.closest('.cart-btn');
    if (!btn) return;
    let id = btn.dataset.id;
    let action = btn.dataset.action;
    cartAction(id, action);
  });

  document.getElementById('cartMinifyBtn').addEventListener('click', function(){
    showCart(false);
  });

  // Открытие корзины по нажатию на "Добавить" (showCart вызывается в updateCart)

  // Заказ
  document.getElementById('orderBtn').addEventListener('click', function() {
    let items = Object.values(cart);
    if (items.length === 0) {
      alert('Корзина пуста!');
      return;
    }
    let orderText = items.map(
      ({qty, data}) => `${data.name} (${qty} шт.)`
    ).join(', ');
    let sum = items.reduce((total,x)=>total+x.qty*x.data.price,0);
    // Интеграция с Telegram Mini App может быть здесь
    alert("Ваш заказ отправлен!\n\n" + orderText + `\nСумма: ${sum} ₽`);
    cart = {};
    updateCart();
  });

  // Инициализация
  renderMenu('soups');
  updateCart();
  </script>
</body>
</html>
